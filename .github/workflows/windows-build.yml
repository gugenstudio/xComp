name: windows-build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --no-progress -y

      - name: Configure PATH for Git Bash tools
        shell: powershell
        run: |
          "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build OpenColorIO
        shell: bash
        run: |
          pushd externals/local/ocio
          ./build_ocio.sh
          popd

      - name: Build and package
        shell: bash
        run: |
          ./build.sh -p

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcomp-windows-package
          path: _tmp/*_Setup.exe
          if-no-files-found: error

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcomp-windows-binary
          path: _bin/Release/xcomp*
          if-no-files-found: warn
