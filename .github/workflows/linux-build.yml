name: linux-build

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            chrpath \
            cmake \
            libglu1-mesa-dev \
            xorg-dev

      - name: Build OpenColorIO
        run: |
          pushd externals/local/ocio
          ./build_ocio.sh
          popd

      - name: Build and package
        run: |
          ./build.sh -p

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcomp-linux-package
          path: _tmp/xcomp_*.tar.gz
          if-no-files-found: error

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcomp-linux-binary
          path: _bin/xcomp*
          if-no-files-found: warn

      - name: Attach Linux package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: _tmp/xcomp_*.tar.gz
