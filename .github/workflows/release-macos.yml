name: release-macos

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-15
    env:
      MACOS_SIGN_IDENTITY_APP: ${{ secrets.MACOS_SIGN_IDENTITY_APP }}
      MACOS_SIGN_IDENTITY_INSTALLER: ${{ secrets.MACOS_SIGN_IDENTITY_INSTALLER }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install imath yaml-cpp

      - name: Import signing certificates
        env:
          MACOS_CERTIFICATES_P12_BASE64: ${{ secrets.MACOS_CERTIFICATES_P12_BASE64 }}
          MACOS_CERTIFICATES_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATES_P12_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERTIFICATES_P12_BASE64}" || -z "${MACOS_CERTIFICATES_P12_PASSWORD}" || -z "${MACOS_KEYCHAIN_PASSWORD}" ]]; then
            echo "Missing one or more signing certificate secrets." >&2
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/xcomp-signing.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/xcomp-signing-certificates.p12"

          ( printf '%s' "${MACOS_CERTIFICATES_P12_BASE64}" | base64 --decode 2>/dev/null || printf '%s' "${MACOS_CERTIFICATES_P12_BASE64}" | base64 -D ) > "${CERT_PATH}"

          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${MACOS_CERTIFICATES_P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${MACOS_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" "${HOME}/Library/Keychains/login.keychain-db"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

      - name: Build OpenColorIO
        run: |
          pushd externals/local/ocio
          ./build_ocio.sh
          popd

      - name: Build and notarize macOS package
        run: ./build.sh -p -s

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PKG_PATH="$(find _tmp -maxdepth 1 -name 'xcomp_*.pkg' -print -quit)"

          if [[ -z "${PKG_PATH}" ]]; then
            echo "No macOS package was generated." >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${PKG_PATH}" --clobber
          else
            gh release create "${TAG_NAME}" "${PKG_PATH}" --title "${TAG_NAME}" --generate-notes
          fi
